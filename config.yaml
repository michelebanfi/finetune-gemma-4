# ==============================================================================
# Gemma-4 Fine-tuning Configuration
# Change `model_preset` to switch between models: "4B" or "31B"
# ==============================================================================

model_preset: "4B"

presets:
  4B:
    model_name: "unsloth/gemma-4-E4B-it"
    max_seq_length: 4096
    lora_r: 16
    lora_alpha: 32
    per_device_batch_size: 1 # conservative for 32GB VRAM with Gemma-4 vision encoder
    gradient_accumulation: 16 # effective batch size = 1 * 16 = 16
    output_dir: "./gemma4-4b-sci-lora"
    gguf_dir: "./gemma4-4b-sci-gguf"

  31B:
    model_name: "unsloth/gemma-4-31B-it"
    max_seq_length: 4096
    lora_r: 16
    lora_alpha: 32
    per_device_batch_size: 2
    gradient_accumulation: 4 # effective batch size = 2 * 4 = 8
    output_dir: "./gemma4-31b-sci-lora"
    gguf_dir: "./gemma4-31b-sci-gguf"

# Shared training settings (apply to all presets)
training:
  learning_rate: 0.0002
  warmup_steps: 60
  lr_scheduler: "cosine"
  num_train_epochs: 1
  max_steps: 100 # Set to -1 for a full epoch
  weight_decay: 0.01
  seed: 42
  lora_dropout: 0

dataset:
  os_data_subset: 15000 # Rows from OpenSciLM/OS_Train_Data (130K total)
  sciriff_data_subset: 15000 # Rows from allenai/SciRIFF-train-mix (70K total)

export:
  gguf: true
  gguf_quantization: "Q8_0" # Only Q8_0, BF16, F16 supported for Gemma-4

hub:
  hf_token: null # Leave null — token is read from HF_TOKEN in .env
  hf_repo: null # Unused (LoRA push disabled)
  hf_repo_gguf: linosium/gemma4-4b-sci # e.g. "your-username/gemma4-4b-sci"
